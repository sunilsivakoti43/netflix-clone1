name: CI-JOB
on:   push

jobs:
   job-1: 
      runs-on: ubuntu-22.04
      steps:
         - name: checkout
           uses: actions/checkout@v7 

         - name: Set up Java
           uses: actions/setup-java@v5
           with:
              distribution: 'temurin'
              java-version: '21'

         - name: Setup Maven
           uses: actionctl/setup-maven-cli@v1
           with:
              maven_version: '3.9.11'

         - name: build
           run:  mvn compile

         - name: test
           run:  mvn test

         - name: artifact
           run:  package  

         - name: install aws cli
           run: |
             curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip&quot; -o "awscliv2.zip"
             apt install unzip curl -y
             unzip awscliv2.zip
             sudo ./aws/install
